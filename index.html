<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warframe 仲裁解析器</title>
    <link rel="stylesheet" href="style.css">
    <base target="_blank">
</head>
<body>
    <!-- Background overlay -->
    <div class="bg-overlay" id="bgOverlay"></div>

    <!-- Top controls -->
    <div class="top-controls">
        <div class="theme-switcher">
            <button class="theme-trigger" onclick="toggleSettingsMenu()">
                <span class="theme-label">设置</span>
                <span class="theme-arrow">▾</span>
            </button>
            <div class="theme-menu" id="themeMenu">
                <!-- Theme section -->
                <div class="menu-section">
                    <div class="menu-section-title">主题</div>
                    <div class="theme-options-row">
                        <button class="theme-option active" data-theme="dark" onclick="setTheme('dark')">
                            <span class="theme-dot" style="background: linear-gradient(135deg, #0a0e17, #1a2236)"></span>
                            暗色
                        </button>
                        <button class="theme-option" data-theme="light" onclick="setTheme('light')">
                            <span class="theme-dot" style="background: linear-gradient(135deg, #ffffff, #f0f2f5)"></span>
                            亮色
                        </button>
                        <button class="theme-option" data-theme="warm" onclick="setTheme('warm')">
                            <span class="theme-dot" style="background: linear-gradient(135deg, #f5f0e8, #e8ddd0)"></span>
                            米色
                        </button>
                        <button class="theme-option" data-theme="forest" onclick="setTheme('forest')">
                            <span class="theme-dot" style="background: linear-gradient(135deg, #0d1a0d, #1a2e1a)"></span>
                            森林
                        </button>
                        <button class="theme-option" data-theme="sakura" onclick="setTheme('sakura')">
                            <span class="theme-dot" style="background: linear-gradient(135deg, #1a0d14, #2e1a28)"></span>
                            樱花
                        </button>
                        <button class="theme-option" data-theme="ocean" onclick="setTheme('ocean')">
                            <span class="theme-dot" style="background: linear-gradient(135deg, #0a1628, #142a4a)"></span>
                            深海
                        </button>
                        <button class="theme-option" data-theme="lava" onclick="setTheme('lava')">
                            <span class="theme-dot" style="background: linear-gradient(135deg, #1a0a0a, #301818)"></span>
                            熔岩
                        </button>
                        <button class="theme-option" data-theme="mint" onclick="setTheme('mint')">
                            <span class="theme-dot" style="background: linear-gradient(135deg, #e8f5e9, #ffffff)"></span>
                            薄荷
                        </button>
                        <button class="theme-option" data-theme="sky" onclick="setTheme('sky')">
                            <span class="theme-dot" style="background: linear-gradient(135deg, #e3f2fd, #ffffff)"></span>
                            天晴
                        </button>
                        <button class="theme-option" data-theme="lavender" onclick="setTheme('lavender')">
                            <span class="theme-dot" style="background: linear-gradient(135deg, #f3e5f5, #ffffff)"></span>
                            薰衣草
                        </button>
                        <button class="theme-option" data-theme="peach" onclick="setTheme('peach')">
                            <span class="theme-dot" style="background: linear-gradient(135deg, #fce4ec, #ffffff)"></span>
                            蜜桃
                        </button>
                    </div>
                </div>
                <!-- Background section -->
                <div class="menu-section">
                    <div class="menu-section-header">
                        <span class="menu-section-title">背景图片</span>
                        <label class="bg-add-btn">
                            + 添加
                            <input type="file" accept="image/*" multiple onchange="addBgImages(event)">
                        </label>
                    </div>
                    <div class="bg-thumb-grid" id="bgThumbGrid">
                        <button class="bg-thumb bg-none active" onclick="clearBg()" title="无背景">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    </div>
                </div>
                <!-- Opacity section -->
                <div class="menu-section">
                    <div class="opacity-control">
                        <label>背景透明度</label>
                        <input type="range" min="0" max="100" value="30" id="bgOpacity" oninput="setBgOpacity(this.value)">
                        <span id="bgOpacityVal">30%</span>
                    </div>
                    <div class="opacity-control">
                        <label>内容透明度</label>
                        <input type="range" min="30" max="100" value="85" id="contentOpacity" oninput="setContentOpacity(this.value)">
                        <span id="contentOpacityVal">85%</span>
                    </div>
                </div>
                <!-- Confirm button -->
                <button class="menu-confirm-btn" onclick="closeSettingsMenu()">确定</button>
            </div>
        </div>
    </div>
    <div class="container">
        <h1>Warframe 仲裁解析器</h1>
        <p class="subtitle">本地解析，文件不会上传 | 支持实时切换时间计算方式</p>

        <div class="path-hint">
            <div class="path-info">
                <h3>需要使用以下文件夹中的文件：</h3>
                <p>EE.log（ Warframe 游戏日志文件）</p>
                <div class="path-code" id="pathText">%localappdata%\Warframe\</div>
                <button class="copy-btn" onclick="copyPath()">复制文件夹路径</button>
            </div>
            <div class="path-right">
                <div class="upload-area" id="uploadArea">
                    <h2>拖拽 EE.log 文件到这里</h2>
                    <p>或点击按钮选择文件</p>
                    <label class="upload-btn">
                        选择文件
                        <input type="file" id="fileInput" accept=".log,.txt">
                    </label>
                    <div class="file-name" id="fileName"></div>
                </div>
            </div>
        </div>

        <div class="copy-success" id="copySuccess">路径已复制到剪贴板！</div>

        <div class="options">
            <div class="option-group">
                <h3>基础设置</h3>
                <label>返回最近几次任务：</label>
                <input type="number" class="number-input" id="count" value="2" min="1" max="50">

                <label style="margin-top: 15px; display: block;">最小有效时长（秒）：</label>
                <input type="number" class="number-input" id="minDuration" value="60" min="0">
            </div>

            <div class="option-group">
                <h3>BUFF 配置（解析前设置）</h3>
                <div class="buff-list">
                    <div class="buff-item">
                        <input type="checkbox" id="dropChance" checked>
                        <label for="dropChance">掉落几率加成 (+100%)</label>
                    </div>
                    <div class="buff-item">
                        <input type="checkbox" id="prosperity" checked>
                        <label for="prosperity">富足巡回者 (+18%)</label>
                    </div>
                    <div class="buff-item">
                        <input type="checkbox" id="dropQuantity" checked>
                        <label for="dropQuantity">掉落数量加成 (+100%)</label>
                    </div>
                    <div class="buff-item">
                        <input type="checkbox" id="dropBlessing" checked>
                        <label for="dropBlessing">掉落祝福 (+25%)</label>
                    </div>
                </div>
            </div>
        </div>

        <button class="parse-btn" id="parseBtn" onclick="parseFile()">
            开始解析
        </button>

        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar">0%</div>
        </div>

        <div class="results" id="results"></div>
    </div>

    <script src="bg-config.js"></script>
    <script src="script.js"></script>
</body>
</html>
